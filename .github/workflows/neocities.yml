name: Deploy to Neocities
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Neocities
        uses: bcomnes/deploy-to-neocities@v1
        with:
          # Change "api_token" to "api_key"
          api_key: ${{ secrets.NEOCITIES_API_TOKEN }} 
          cleanup: false
          dist_dir: .
